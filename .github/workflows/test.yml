name: Run Tests

on:
  push:
    branches: ["*"]
  pull_request:

jobs:
  server-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --quiet --eval 'db.runCommand({ ping: 1 })' || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      NODE_ENV: test
      DISABLE_EMAIL: "true"
      MONGO_URI_TEST: mongodb://127.0.0.1:27017/promptx_test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Wait for MongoDB
        run: |
          for i in {1..30}; do
            (echo > /dev/tcp/127.0.0.1/27017) >/dev/null 2>&1 && exit 0
            sleep 1
          done
          echo "MongoDB did not become ready in time" >&2
          exit 1

      - run: npm ci
      - run: npm test
