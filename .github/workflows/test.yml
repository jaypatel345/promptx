name: Run Tests

on:
  push:
    branches: [ "*" ]
  pull_request:

jobs:
  server-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Server   #  FIX: point to backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test