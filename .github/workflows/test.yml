name: CI/CD Pipeline

on:
  push:
    branches: ["dev", "main", "feature/*"]
  pull_request:

jobs:
  server-tests:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      DISABLE_EMAIL: "true"
      MONGO_URI_TEST: ${{ secrets.MONGO_URI_TEST }}

    steps:
      - uses: actions/checkout@v4

      - name: Detect server directory
        shell: bash
        run: |
          if [ -d "server" ]; then
            echo "SERVER_DIR=server" >> "$GITHUB_ENV"
          elif [ -d "Server" ]; then
            echo "SERVER_DIR=Server" >> "$GITHUB_ENV"
          else
            echo "Could not find server directory (expected ./server or ./Server)" >&2
            ls -la
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
 
      - name: Install server deps
        shell: bash
        run: cd "$SERVER_DIR" && npm ci

      - name: Run server tests
        shell: bash
        run: cd "$SERVER_DIR" && npm test

  deploy:
    needs: server-tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to Render
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK secret is missing/empty" >&2
            exit 1
          fi
          curl -fsSL -X POST "$RENDER_DEPLOY_HOOK"
